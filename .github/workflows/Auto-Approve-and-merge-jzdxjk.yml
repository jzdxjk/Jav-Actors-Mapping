name: Auto Approve and Merge jzdxjk PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_run:
    workflows:
      - Actor Mapping Format x AVdb 1.0.0
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  approve-and-merge:
    if: github.event_name == 'pull_request_target' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Approve and merge pull request
        uses: actions/github-script@v7
        with:
          script: |
            const trustedContributor = 'jzdxjk'
            const allowedFiles = new Set(['actor-mapping.xml'])

            async function getPullRequest() {
              if (context.eventName === 'pull_request_target') {
                return context.payload.pull_request
              }

              const pullRequests = context.payload.workflow_run.pull_requests
              if (pullRequests.length) {
                const { data: pullRequest } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullRequests[0].number
                })

                return pullRequest
              }

              const headRepositoryOwner = context.payload.workflow_run.head_repository.owner.login
              const headBranch = context.payload.workflow_run.head_branch
              const { data: matchingPullRequests } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${headRepositoryOwner}:${headBranch}`,
                per_page: 1
              })

              if (!matchingPullRequests.length) {
                core.info('No pull request found for this workflow run.')
                return null
              }

              return matchingPullRequests[0]
            }

            const pullRequest = await getPullRequest()
            if (!pullRequest) {
              return
            }

            if (pullRequest.state !== 'open') {
              core.info(`PR #${pullRequest.number} is ${pullRequest.state}; skipping.`)
              return
            }

            if (pullRequest.user.login !== trustedContributor) {
              core.info(`PR author is ${pullRequest.user.login}; skipping.`)
              return
            }

            if (pullRequest.draft) {
              core.info(`PR #${pullRequest.number} is a draft; skipping.`)
              return
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              per_page: 100
            })

            const changedFiles = files.map((file) => file.filename)
            const onlyAllowedFiles =
              changedFiles.length > 0 &&
              changedFiles.every((filename) => allowedFiles.has(filename))

            core.info(`Changed files: ${changedFiles.join(', ')}`)
            if (!onlyAllowedFiles) {
              core.info('PR changes files outside actor-mapping.xml; skipping.')
              return
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullRequest.number,
                event: 'APPROVE',
                body: 'Automatically approved trusted contributor jzdxjk for actor-mapping.xml-only changes.'
              })
            } catch (error) {
              if (error.status === 422) {
                core.info(`Approval skipped: ${error.message}`)
              } else {
                throw error
              }
            }

            if (context.eventName !== 'workflow_run') {
              core.info('PR approved; merge waits for the format workflow to pass.')
              return
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullRequest.number,
                merge_method: 'squash',
                sha: pullRequest.head.sha
              })
            } catch (error) {
              if ([405, 409].includes(error.status)) {
                core.info(`Merge skipped: ${error.message}`)
                return
              }

              throw error
            }
